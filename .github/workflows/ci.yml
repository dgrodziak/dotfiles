name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fish zsh
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install prek
        run: python -m pip install prek
      - name: Run prek
        run: prek run --all-files --show-diff-on-failure
