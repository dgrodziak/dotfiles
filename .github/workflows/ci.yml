name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fish zsh shellcheck
      - name: Bash syntax
        run: |
          mapfile -t files < <(git ls-files 'install' 'bashrc' 'bash/*.bash' 'shell/*.sh')
          bash -n "${files[@]}"
      - name: Zsh syntax
        run: |
          mapfile -t files < <(git ls-files 'zshrc' 'zsh/*.zsh')
          zsh -n "${files[@]}"
      - name: Fish syntax
        run: |
          mapfile -t files < <(git ls-files 'fish/config.fish' 'fish/conf.d/*.fish' 'fish/functions/*.fish')
          fish --no-execute "${files[@]}"
      - name: ShellCheck
        run: |
          mapfile -t files < <(git ls-files 'install' 'bashrc' 'bash/*.bash' 'shell/*.sh')
          shellcheck --shell=bash --severity=warning "${files[@]}"

  lua-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check nvim
