repos:
  - repo: local
    hooks:
      - id: bash-syntax
        name: Bash syntax
        entry: bash -n
        language: system
        files: ^(install|bashrc|bash/.*\.bash|shell/.*\.sh)$

      - id: zsh-syntax
        name: Zsh syntax
        entry: zsh -n
        language: system
        files: ^(zshrc|zsh/.*\.zsh)$

      - id: fish-syntax
        name: Fish syntax
        entry: fish --no-execute
        language: system
        files: ^(fish/config\.fish|fish/conf\.d/.*\.fish|fish/functions/.*\.fish)$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: ShellCheck
        args: [--shell=bash, --severity=warning]
        files: ^(install|bashrc|bash/.*\.bash|shell/.*\.sh)$

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.3.1
    hooks:
      - id: stylua-github
        name: StyLua
        args: [--check]
        files: ^nvim/.*\.lua$
